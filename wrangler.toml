name = "btch-workers"
main = "src/index.ts"
compatibility_date = "2024-12-19"
compatibility_flags = ["nodejs_compat"]

# Workers 开发配置
workers_dev = true

# 环境变量
[env.production]
vars = { BACKEND_URL = "https://backend1.tioo.eu.org", LOG_LEVEL = "info" }

[env.development]
vars = { BACKEND_URL = "https://backend1.tioo.eu.org", LOG_LEVEL = "debug" }

# KV 命名空间（可选，用于缓存）
[[kv_namespaces]]
binding = "CACHE_STORE"
id = "your-kv-namespace-id"
preview_id = "your-preview-kv-namespace-id"

# 构建配置
[build]
command = "npm run build"
cwd = "./"
